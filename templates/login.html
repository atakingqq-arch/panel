<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#111827;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            width:360px;
            background:#1f2937;
            padding:30px;
            border-radius:12px;
            box-shadow:0 0 20px rgba(0,0,0,.4);
        }

        h1{
            color:white;
            text-align:center;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            border:none;
            border-radius:8px;
            background:#374151;
            color:white;
        }

        input::placeholder{
            color:#cbd5e1;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#1d4ed8;
        }

        p{
            text-align:center;
            color:white;
            margin-top:15px;
        }

        a{
            color:#60a5fa;
            text-decoration:none;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h1>Giriş Yap</h1>

    <form method="POST" action="/login">

        <input type="text" name="username" placeholder="Kullanıcı Adı" required>

        <input type="password" name="password" placeholder="Şifre" required>

        <button type="submit">
            Giriş Yap
        </button>

    </form>

    <p><a href="/">Ana Menü</a></p>

</div>

</body>
</html>
